apiVersion: v1
kind: Pod
metadata:
  name: todoapp-pod
  namespace: todoapp
  labels:
    app: todoapp
spec:
  containers:
    - name: todoapp
      image: ikulyk404/todoapp:4.0.1
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: 150m
          memory: 256Mi
        limits:
          cpu: 150m
          memory: 256Mi