namespace: todoapp

serviceAccount:
  name: secrets-reader

image:
  repository: ikulyk404/todoapp
  tag: "4.0.1"

replicaCount: 2

rollingUpdate:
  maxSurge: 1
  maxUnavailable: 1

resources:
  requests:
    cpu: 150m
    memory: 256Mi
  limits:
    cpu: 150m
    memory: 256Mi

affinity:
  key: app
  values:
    - web

secrets:
  data:
    DB_NAME: "YXBwX2RiCg=="
    DB_USER: "YXBwX3VzZXI="
    DB_PASSWORD: "MTIzNA=="
    DB_HOST: "bXlzcWwtMC5teXNxbC5teXNxbC5zdmMuY2x1c3Rlci5sb2NhbAo="

hpa:
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

pv:
  capacity: 1Gi

pvc:
  storageRequest: 1Gi